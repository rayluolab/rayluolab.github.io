# Theme metadata
name = "Luo Lab"

[light]
  # Primary accent (CPK-blue, from the logo's molecule)
  primary = "#2B4C8C"

  # Page background — warm rice paper (ink-on-paper feel)
  background = "#F6F1E7"

  # Menu / navbar — matches the paper
  menu_primary = "#F6F1E7"
  menu_text = "#1A1A1A"
  menu_text_active = "#2B4C8C"
  menu_title = "#1A1A1A"

  # Home section backgrounds — warm paper (subtle alternation, no white)
  home_section_odd = "rgb(248, 243, 233)"
  home_section_even = "rgb(240, 233, 219)"

  # Links
  link = "#2B4C8C"
  link_hover = "#1d3563"
