name: Refresh publications from OpenAlex

on:
  schedule:
    - cron: '0 6 1 * *'   # 06:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  OPENALEX_AUTHOR_ID: 'A5032088629'   # Ray Luo (UC Irvine)

jobs:
  refresh:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch publications from OpenAlex
        run: python3 scripts/fetch_openalex.py "${OPENALEX_AUTHOR_ID}" publications.bib
      - name: Open PR if publications.bib changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'content: refresh publications.bib from OpenAlex'
          title: 'Monthly publications refresh'
          body: |
            Auto-updated `publications.bib` from OpenAlex (author `A5032088629`).
            Merging this triggers `import-publications.yml`, which converts the
            BibTeX into `content/publication/` pages.
          branch: openalex-refresh
          delete-branch: true
          labels: automated-pr, content
